name: Generate Coverage Report

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch to avoid redundant deployments.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Generate coverage badge
        run: |
          node -e "
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const pct = summary.total.statements.pct;
            const color = pct >= 80 ? 'brightgreen' : pct >= 60 ? 'yellow' : 'red';
            const badge = {
              schemaVersion: 1,
              label: 'coverage',
              message: pct.toFixed(1) + '%',
              color
            };
            fs.writeFileSync('coverage/coverage-badge.json', JSON.stringify(badge));
            console.log('Statement coverage: ' + pct.toFixed(1) + '%');
          "

      # Upload the coverage directory as a GitHub Pages artifact.
      # Only do this on pushes to main so PRs don't trigger a deployment.
      - name: Upload coverage report for GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./coverage

  deploy-pages:
    name: Deploy Coverage Report
    needs: test
    # Only deploy on direct pushes to main, not on pull requests.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
