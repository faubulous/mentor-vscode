name: Package

on:
  push:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    name: Build VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Build VSIX
        run: npm run package

      - name: Determine artifact name
        id: artifact
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BRANCH="${{ github.ref_name }}"
          SAFE_BRANCH="${BRANCH//\//-}"
          echo "name=mentor-${VERSION}-${SAFE_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Rename VSIX
        run: mv dist/mentor.vsix "dist/${{ steps.artifact.outputs.name }}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: "dist/${{ steps.artifact.outputs.name }}.vsix"
          if-no-files-found: error
